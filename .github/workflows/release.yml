name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          New-Item -ItemType Directory -Path release
          Copy-Item cardgame.exe release\
          Copy-Item -Recurse config  release\config
          Copy-Item -Recurse sounds  release\sounds
          Compress-Archive -Path release\* -DestinationPath RoguelikeCardgame.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: RoguelikeCardgame.zip
          generate_release_notes: true