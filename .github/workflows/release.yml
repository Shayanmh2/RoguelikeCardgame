name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write 

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          New-Item -ItemType Directory -Path release_folder
          Copy-Item build\Release\cardgame.exe release_folder\
          Copy-Item -Recurse config release_folder\config
          Copy-Item -Recurse sounds release_folder\sounds
          Compress-Archive -Path release_folder\* -DestinationPath RoguelikeCardgame.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: RoguelikeCardgame.zip
          generate_release_notes: true